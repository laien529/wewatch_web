<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>微看</title>
<link rel="icon" href="/admin/ic_launcher.png">
<style>
  :root{--bg:#f8fafc;--card:#fff;--line:#e2e8f0;--text:#0f172a;--muted:#64748b;--primary:#111827;--danger:#dc2626;--soft:#e5e7eb;--unread:#eefcf2}
  *{box-sizing:border-box;-webkit-touch-callout:none}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
  .toolbar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);padding:10px}
  .toolbar-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .toolbar-row + .toolbar-row{margin-top:8px}
  .input{padding:8px 10px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px;background:#fff;min-width:0}
  .input.search{width:92px;min-width:92px;flex:0 0 92px}
  .input.date{width:128px;min-width:128px}
  .btn{padding:8px 12px;border:none;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap}
  .btn.compact{padding:8px 10px}
  .btn.primary{background:var(--primary);color:#fff}
  .btn.gray{background:var(--soft);color:var(--text)}
  .btn.danger{background:var(--danger);color:#fff}
  .btn.outline{background:#fff;border:1px solid #cbd5e1;color:var(--text)}
  .badge{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 7px;border-radius:999px;background:var(--danger);color:#fff;font-size:11px;font-weight:700}
  .toolbar-filters{gap:6px}
  .toolbar-actions{margin-left:auto;display:flex;gap:6px;align-items:center;min-width:0;overflow-x:auto;scrollbar-width:none}
  .toolbar-actions::-webkit-scrollbar{display:none}
  .filter-group{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .filter-label{font-size:12px;color:var(--muted);white-space:nowrap}
  .filter-options{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .option-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 8px;border:1px solid #cbd5e1;border-radius:999px;background:#fff;font-size:12px;color:var(--text);white-space:nowrap}
  .option-chip input{margin:0}
  .date-range{display:flex;gap:6px;align-items:center;flex-wrap:nowrap}
  .date-sep{font-size:12px;color:var(--muted);white-space:nowrap}
  .desktop-actions{display:none}
  .list{padding:6px}
  .table-wrap{display:none}
  .card{background:var(--card);margin:6px 0;border-radius:10px;padding:10px;border:1px solid var(--line)}
  .card.unread{background:var(--unread)}
  .row{display:flex;justify-content:space-between;gap:8px;font-size:12px;color:var(--muted);margin-bottom:4px}
  .content{font-size:14px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
  .content a{color:#2563eb;text-decoration:underline;word-break:break-all}
  .footer{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;color:var(--muted);font-size:12px;background:#fff;border-top:1px solid var(--line);position:sticky;bottom:0;z-index:10}
  .footer-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .modal-mask{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;padding:20px;z-index:100;-webkit-touch-callout:none;user-select:none}
  .modal{width:min(360px,100%);background:#fff;border-radius:14px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.18);-webkit-touch-callout:none;user-select:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  .modal *{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  .modal h3{margin:0 0 6px 0;font-size:18px}
  .modal p{margin:0 0 12px 0;font-size:13px;color:var(--muted)}
  .stack{display:flex;flex-direction:column;gap:10px}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px}
  .tip{font-size:12px;color:var(--danger);min-height:18px}
  .table{width:100%;border-collapse:collapse;background:#fff}
  .table th,.table td{border-bottom:1px solid var(--line);padding:10px 8px;font-size:13px;vertical-align:top}
  .table th{text-align:center;color:var(--muted);font-weight:600;background:#f8fafc}
  .table td{text-align:center}
  .message-cell{text-align:left;white-space:pre-wrap;word-break:break-word;line-height:1.5}
  .table tr.unread{background:var(--unread)}
  .muted{color:var(--muted)}
  @media (min-width:768px){
    .input.search{width:160px;min-width:160px;flex:0 0 160px}
    .input.date{width:132px;min-width:132px}
    .toolbar{display:grid;grid-template-columns:minmax(0,1fr) auto;column-gap:12px;row-gap:8px;align-items:start}
    .toolbar-row + .toolbar-row{margin-top:0}
    .toolbar-filters{grid-column:1;min-width:0}
    .toolbar-actions-row{grid-column:2;justify-content:flex-end}
    .toolbar-actions{gap:8px;overflow:visible}
    .desktop-actions{display:flex;gap:8px;margin-left:8px}
    .mobile-list{display:none}
    .table-wrap{display:block;padding:8px}
  }
  @media (min-width:1100px){
    .toolbar-filters{flex-wrap:nowrap}
  }
  @media (max-width:767px){
    .toolbar-actions-row{width:100%}
  }
</style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-row toolbar-filters">
      <input id="searchText" class="input search" placeholder="查找关键词">
      <div class="date-range">
        <input id="startTime" class="input date" type="date" placeholder="开始日期">
        <span class="date-sep">至</span>
        <input id="endTime" class="input date" type="date" placeholder="结束日期">
      </div>
      <div class="filter-group">
        <span class="filter-label">时间</span>
        <div class="filter-options">
          <label class="option-chip"><input type="radio" name="quickHours" value="" checked>不限</label>
          <label class="option-chip"><input type="radio" name="quickHours" value="12">12小时内</label>
          <label class="option-chip"><input type="radio" name="quickHours" value="24">24小时内</label>
          <label class="option-chip"><input type="radio" name="quickHours" value="72">3天内</label>
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-label">关键词</span>
        <div class="filter-options">
          <label class="option-chip"><input type="checkbox" name="keywordFilter" value="direct">直发</label>
          <label class="option-chip"><input type="checkbox" name="keywordFilter" value="miniapp">小程序</label>
          <label class="option-chip"><input type="checkbox" name="keywordFilter" value="link">链接</label>
        </div>
      </div>
    </div>
    <div class="toolbar-row toolbar-actions-row">
      <div class="toolbar-actions">
        <button id="queryBtn" class="btn primary compact">查询</button>
        <button id="resetBtn" class="btn gray compact">重置</button>
        <span id="unreadBadge" class="badge">0</span>
        <button id="notifyBtn" class="btn outline compact">通知</button>
        <button id="readAllBtn" class="btn outline compact">一键已读</button>
        <button id="clearAllBtn" class="btn danger compact">清空</button>
        <div class="desktop-actions">
          <button id="bulkReadBtn" class="btn outline">选中已读</button>
          <button id="bulkDeleteBtn" class="btn danger">选中删除</button>
        </div>
      </div>
    </div>
  </div>

  <div class="list mobile-list" id="mobileList"></div>

  <div class="table-wrap">
    <table class="table">
      <thead>
        <tr>
          <th style="width:42px"><input type="checkbox" id="checkAll"></th>
          <th style="width:70px">ID</th>
          <th style="width:160px">发送人</th>
          <th style="width:180px">时间</th>
          <th>消息内容</th>
          <th style="width:140px">操作</th>
        </tr>
      </thead>
      <tbody id="desktopTbody">
        <tr><td colspan="6" class="muted">暂无数据</td></tr>
      </tbody>
    </table>
  </div>

  <div class="footer">
    <div id="pageInfo">第 1 / 1 页，共 0 条</div>
    <div class="footer-right">
      <label><input type="radio" name="pageSize" value="10" checked>10</label>
      <label><input type="radio" name="pageSize" value="20">20</label>
      <label><input type="radio" name="pageSize" value="50">50</label>
      <button id="prevBtn" class="btn gray">上一页</button>
      <button id="nextBtn" class="btn gray">下一页</button>
    </div>
  </div>

  <div id="loginMask" class="modal-mask">
    <div class="modal">
      <h3>请重新登录</h3>
      <p>当前登录状态已失效，请重新输入账号密码。</p>
      <div class="stack">
        <input id="loginUsername" class="input" value="admin" placeholder="用户名">
        <input id="loginPassword" class="input" type="password" value="123456" placeholder="密码">
        <button id="loginBtn" class="btn primary">登录</button>
        <div id="loginTip" class="tip"></div>
      </div>
    </div>
  </div>

  <div id="mobileActionMask" class="modal-mask">
    <div class="modal" id="mobileActionModal">
      <h3>消息操作</h3>
      <p>请选择要执行的操作。</p>
      <div class="stack">
        <button id="mobileReadBtn" class="btn primary">设为已读</button>
        <button id="mobileDeleteBtn" class="btn danger">删除</button>
        <button id="mobileCancelBtn" class="btn gray">取消</button>
      </div>
    </div>
  </div>

  <div id="confirmMask" class="modal-mask">
    <div class="modal" id="confirmModal">
      <h3 id="confirmTitle">确认操作</h3>
      <p id="confirmText">请确认是否继续。</p>
      <div class="modal-actions">
        <button id="confirmCancelBtn" class="btn gray">取消</button>
        <button id="confirmOkBtn" class="btn primary">确认</button>
      </div>
      <div id="confirmTip" class="tip"></div>
    </div>
  </div>

<script>
const APP_NAME='微看';
const APP_ICON='/admin/ic_launcher.png';
const LS_TOKEN='mex_admin_token';
const LS_USER='mex_admin_user';
const LONG_PRESS_DELAY=700;
const LONG_PRESS_MOVE_LIMIT=10;
const AUTO_REFRESH_INTERVAL=60000;
const state={token:localStorage.getItem(LS_TOKEN)||'',username:localStorage.getItem(LS_USER)||'admin',page:1,totalPages:1,total:0,unreadTotal:0,lastUnreadTotal:null,loadingLogin:false,loadingMessages:false,confirming:false,confirmAction:null,longPressTimer:null,actionId:null,list:[],selected:new Set()};
const els={
  searchText:document.getElementById('searchText'),
  startTime:document.getElementById('startTime'),
  endTime:document.getElementById('endTime'),
  queryBtn:document.getElementById('queryBtn'),
  resetBtn:document.getElementById('resetBtn'),
  unreadBadge:document.getElementById('unreadBadge'),
  notifyBtn:document.getElementById('notifyBtn'),
  readAllBtn:document.getElementById('readAllBtn'),
  clearAllBtn:document.getElementById('clearAllBtn'),
  mobileList:document.getElementById('mobileList'),
  desktopTbody:document.getElementById('desktopTbody'),
  checkAll:document.getElementById('checkAll'),
  bulkReadBtn:document.getElementById('bulkReadBtn'),
  bulkDeleteBtn:document.getElementById('bulkDeleteBtn'),
  pageInfo:document.getElementById('pageInfo'),
  prevBtn:document.getElementById('prevBtn'),
  nextBtn:document.getElementById('nextBtn'),
  loginMask:document.getElementById('loginMask'),
  loginUsername:document.getElementById('loginUsername'),
  loginPassword:document.getElementById('loginPassword'),
  loginBtn:document.getElementById('loginBtn'),
  loginTip:document.getElementById('loginTip'),
  mobileActionMask:document.getElementById('mobileActionMask'),
  mobileActionModal:document.getElementById('mobileActionModal'),
  mobileReadBtn:document.getElementById('mobileReadBtn'),
  mobileDeleteBtn:document.getElementById('mobileDeleteBtn'),
  mobileCancelBtn:document.getElementById('mobileCancelBtn'),
  confirmMask:document.getElementById('confirmMask'),
  confirmModal:document.getElementById('confirmModal'),
  confirmTitle:document.getElementById('confirmTitle'),
  confirmText:document.getElementById('confirmText'),
  confirmCancelBtn:document.getElementById('confirmCancelBtn'),
  confirmOkBtn:document.getElementById('confirmOkBtn'),
  confirmTip:document.getElementById('confirmTip')
};
function isDesktop(){return window.matchMedia('(min-width:768px)').matches;}
function currentPageSize(){const checked=document.querySelector('input[name="pageSize"]:checked');return checked?Number(checked.value):10;}
function currentQuickHours(){const checked=document.querySelector('input[name="quickHours"]:checked');return checked&&checked.value?Number(checked.value):0;}
function selectedKeywords(){return Array.from(document.querySelectorAll('input[name="keywordFilter"]:checked')).map(el=>el.value);}
function escapeHtml(s=''){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function linkify(text=''){return escapeHtml(text).replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');}
function formatDate(v){const d=new Date(v);if(Number.isNaN(d.getTime())) return String(v||'-');const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;}
function normalizeTimeInputs(){}
function clearQuickHours(){
  const none=document.querySelector('input[name="quickHours"][value=""]');
  if(none) none.checked=true;
}
function applyQuickHours(hours){
  if(!hours){
    clearQuickHours();
    els.startTime.value='';
    els.endTime.value='';
    return;
  }
  els.startTime.value='';
  els.endTime.value='';
}
function haptic(){try{if(navigator.vibrate) navigator.vibrate(18);}catch(e){}}
function supportsNotification(){return 'Notification' in window&&window.isSecureContext;}
function updateNotifyButton(){
  if(!supportsNotification()){
    els.notifyBtn.textContent='无通知';
    els.notifyBtn.disabled=true;
    return;
  }
  if(Notification.permission==='granted'){
    els.notifyBtn.textContent='通知已开';
    els.notifyBtn.disabled=true;
  }else if(Notification.permission==='denied'){
    els.notifyBtn.textContent='通知关闭';
    els.notifyBtn.disabled=true;
  }else{
    els.notifyBtn.textContent='通知';
    els.notifyBtn.disabled=false;
  }
}
async function requestNotificationPermission(){
  if(!supportsNotification()) return;
  const permission=await Notification.requestPermission();
  updateNotifyButton();
  if(permission==='granted'){
    const notification=new Notification(APP_NAME,{body:'新消息通知已开启',icon:APP_ICON,badge:APP_ICON,tag:'wewatch-notify-enabled'});
    window.setTimeout(()=>notification.close(),3000);
  }
}
function shouldNotifyNewMessages(count){
  return count>0&&supportsNotification()&&Notification.permission==='granted'&&(document.hidden||!document.hasFocus());
}
function notifyNewMessages(count,total){
  if(!shouldNotifyNewMessages(count)) return;
  const body=`收到 ${count} 条新消息，当前未读 ${total} 条`;
  const notification=new Notification(APP_NAME,{body,icon:APP_ICON,badge:APP_ICON,tag:'wewatch-new-message',renotify:true});
  notification.onclick=()=>{window.focus();notification.close();autoRefreshMessages();};
}
function trackUnreadChange(nextUnreadTotal){
  const previous=state.lastUnreadTotal;
  state.lastUnreadTotal=nextUnreadTotal;
  if(previous===null) return;
  const increased=nextUnreadTotal-previous;
  notifyNewMessages(increased,nextUnreadTotal);
}
function openLogin(message=''){els.loginUsername.value=state.username||'admin';els.loginPassword.value='123456';els.loginTip.textContent=message;els.loginMask.style.display='flex';}
function closeLogin(){els.loginTip.textContent='';els.loginMask.style.display='none';}
function openMobileAction(id){state.actionId=id;haptic();els.mobileActionMask.style.display='flex';}
function closeMobileAction(){els.mobileActionMask.style.display='none';state.actionId=null;}
function openConfirm(options){
  state.confirmAction=options.onConfirm;
  els.confirmTitle.textContent=options.title;
  els.confirmText.textContent=options.text;
  els.confirmOkBtn.textContent=options.okText||'确认';
  els.confirmOkBtn.className=`btn ${options.okClass||'primary'}`;
  els.confirmTip.textContent='';
  els.confirmMask.style.display='flex';
}
function closeConfirm(){
  if(state.confirming) return;
  state.confirmAction=null;
  els.confirmTip.textContent='';
  els.confirmMask.style.display='none';
}
async function runConfirm(){
  if(state.confirming||!state.confirmAction) return;
  state.confirming=true;
  els.confirmOkBtn.disabled=true;
  const oldText=els.confirmOkBtn.textContent;
  els.confirmOkBtn.textContent='处理中...';
  try{
    await state.confirmAction();
    state.confirming=false;
    els.confirmOkBtn.disabled=false;
    els.confirmOkBtn.textContent=oldText;
    closeConfirm();
  }catch(e){
    state.confirming=false;
    els.confirmOkBtn.disabled=false;
    els.confirmOkBtn.textContent=oldText;
    if(e.message!=='TOKEN_EXPIRED') els.confirmTip.textContent='操作失败，请稍后重试';
  }
}
function clearToken(){state.token='';localStorage.removeItem(LS_TOKEN);}
async function apiFetch(url,options={}){
  const headers=Object.assign({},options.headers||{});
  if(state.token) headers.Authorization=`Bearer ${state.token}`;
  const resp=await fetch(url,Object.assign({},options,{headers}));
  const data=await resp.json().catch(()=>({code:resp.status,message:'invalid response'}));
  const tokenError=resp.status===401||data.code===401||/token/i.test(String(data.message||''))||data.message==='no token'||data.message==='invalid token';
  if(tokenError){state.confirming=false;els.confirmOkBtn.disabled=false;closeConfirm();closeMobileAction();clearToken();openLogin('登录已失效，请重新登录');throw new Error('TOKEN_EXPIRED');}
  return data;
}
async function doLogin(){
  if(state.loadingLogin) return;
  state.loadingLogin=true;els.loginTip.textContent='';
  try{
    const resp=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:els.loginUsername.value.trim(),password:els.loginPassword.value})});
    const data=await resp.json();
    if(data.code===0&&data.data&&data.data.token){
      state.token=data.data.token;state.username=els.loginUsername.value.trim()||'admin';
      localStorage.setItem(LS_TOKEN,state.token);localStorage.setItem(LS_USER,state.username);
      closeLogin();await loadMessages();
    }else{els.loginTip.textContent=data.message||'登录失败';}
  }catch(e){els.loginTip.textContent='登录失败，请稍后重试';}
  finally{state.loadingLogin=false;}
}
function swallowLongPressOnModal(node){
  ['touchstart','touchend','touchcancel','contextmenu'].forEach(type=>{
    node.addEventListener(type,e=>{e.stopPropagation();if(type==='contextmenu')e.preventDefault();},{passive:false});
  });
}
function cancelLongPress(){
  if(state.longPressTimer) clearTimeout(state.longPressTimer);
  state.longPressTimer=null;
}
function bindLongPress(node,id,isRead){
  if(isDesktop()||isRead) return;
  let startX=0;
  let startY=0;
  let touchId=null;
  const getTouch=e=>{
    const touches=Array.from(e.touches||[]);
    return touches.find(t=>t.identifier===touchId)||touches[0]||null;
  };
  const start=e=>{
    if(e.touches.length!==1||e.target.closest('a,button,input,label')) return;
    e.stopPropagation();
    cancelLongPress();
    const touch=e.touches[0];
    touchId=touch.identifier;
    startX=touch.clientX;
    startY=touch.clientY;
    state.longPressTimer=setTimeout(()=>{
      state.longPressTimer=null;
      openMobileAction(id);
    },LONG_PRESS_DELAY);
  };
  const move=e=>{
    if(!state.longPressTimer) return;
    if(e.touches.length!==1){cancelLongPress();return;}
    const touch=getTouch(e);
    if(!touch){cancelLongPress();return;}
    const dx=Math.abs(touch.clientX-startX);
    const dy=Math.abs(touch.clientY-startY);
    if(dx>LONG_PRESS_MOVE_LIMIT||dy>LONG_PRESS_MOVE_LIMIT) cancelLongPress();
  };
  const cancel=e=>{
    if(e)e.stopPropagation();
    cancelLongPress();
    touchId=null;
  };
  node.addEventListener('touchstart',start,{passive:true});
  node.addEventListener('touchmove',move,{passive:true});
  node.addEventListener('touchend',cancel,{passive:true});
  node.addEventListener('touchcancel',cancel,{passive:true});
}
function normalize(item){
  const contentJson=item.contentJson||{};
  return {id:item.id,sender:item.sender||contentJson.sender||contentJson.from||'-',createdAt:formatDate(item.createdAt),content:contentJson.content??contentJson.message??JSON.stringify(contentJson,null,2),isRead:!!item.isRead};
}
function updateDesktopActionState(){const disabled=state.selected.size===0;els.bulkReadBtn.disabled=disabled;els.bulkDeleteBtn.disabled=disabled;}
function renderMobile(){
  if(!state.list.length){els.mobileList.innerHTML='<div class="card">暂无数据</div>';return;}
  els.mobileList.innerHTML=state.list.map(item=>`<div class="card ${item.isRead?'':'unread'}" data-id="${item.id}" data-read="${item.isRead?'1':'0'}"><div class="row"><span>${escapeHtml(item.sender)}</span><span>${escapeHtml(item.createdAt)}</span></div><div class="content">${linkify(item.content)}</div></div>`).join('');
  document.querySelectorAll('#mobileList .card').forEach(card=>bindLongPress(card,Number(card.dataset.id),card.dataset.read==='1'));
}
function syncCheckAll(){if(!state.list.length){els.checkAll.checked=false;return;}els.checkAll.checked=state.list.every(item=>state.selected.has(item.id));}
function renderDesktop(){
  if(!state.list.length){els.desktopTbody.innerHTML='<tr><td colspan="6" class="muted">暂无数据</td></tr>';updateDesktopActionState();return;}
  els.desktopTbody.innerHTML=state.list.map(item=>`<tr class="${item.isRead?'':'unread'}"><td><input type="checkbox" class="row-check" data-id="${item.id}" ${state.selected.has(item.id)?'checked':''}></td><td>${item.id}</td><td>${escapeHtml(item.sender)}</td><td>${escapeHtml(item.createdAt)}</td><td class="message-cell">${linkify(item.content)}</td><td>${item.isRead?'<button class="btn gray" disabled>已读</button>':`<button class="btn outline one-read-btn" data-id="${item.id}">设为已读</button>`}</td></tr>`).join('');
  document.querySelectorAll('.row-check').forEach(el=>el.addEventListener('change',e=>{const id=Number(e.target.dataset.id);if(e.target.checked)state.selected.add(id);else state.selected.delete(id);syncCheckAll();updateDesktopActionState();}));
  document.querySelectorAll('.one-read-btn').forEach(el=>el.addEventListener('click',()=>markReadByIds([Number(el.dataset.id)]).catch(()=>{})));
  syncCheckAll();updateDesktopActionState();
}

// ===== 动态标题未读数 =====
function updateTitle() {
  const base = APP_NAME;
  if (state.unreadTotal > 0) {
    document.title = `(${state.unreadTotal}) ` + base;
  } else {
    document.title = base;
  }
}

function render(){els.unreadBadge.textContent=String(state.unreadTotal||0);els.pageInfo.textContent=`第 ${state.page} / ${state.totalPages} 页，共 ${state.total} 条`;renderMobile();renderDesktop();updateTitle();}
async function loadMessages(){
  if(state.loadingMessages) return;
  state.loadingMessages=true;
  const params=new URLSearchParams();params.set('page',String(state.page));params.set('pageSize',String(currentPageSize()));
  if(els.searchText.value.trim()) params.set('q',els.searchText.value.trim());
  if(currentQuickHours()>0) params.set('quickHours',String(currentQuickHours()));
  if(els.startTime.value) params.set('startTime',`${els.startTime.value} 00:00:00`);
  if(els.endTime.value) params.set('endTime',`${els.endTime.value} 23:59:59`);
  selectedKeywords().forEach(keyword=>params.append('keyword',keyword));
  try{
    const data=await apiFetch('/api/messages?'+params.toString());
    const nextUnreadTotal=Number(data.data?.unreadTotal||0);
    trackUnreadChange(nextUnreadTotal);
    state.total=Number(data.data?.pagination?.total||0);state.page=Number(data.data?.pagination?.page||1);state.totalPages=Number(data.data?.pagination?.totalPages||1);state.unreadTotal=nextUnreadTotal;state.list=(data.data?.list||[]).map(normalize);state.selected.clear();render();
  }finally{
    state.loadingMessages=false;
  }
}
function canAutoRefresh(){
  return !state.confirming&&els.loginMask.style.display!=='flex'&&els.mobileActionMask.style.display!=='flex'&&els.confirmMask.style.display!=='flex';
}
function autoRefreshMessages(){
  if(!canAutoRefresh()) return;
  loadMessages().catch(()=>{});
}
function startAutoRefresh(){
  window.setInterval(autoRefreshMessages,AUTO_REFRESH_INTERVAL);
}
function triggerSearch(){
  state.page=1;
  loadMessages().catch(()=>{});
}
async function markReadByIds(ids){if(!ids.length) return;const data=await apiFetch('/api/messages/read',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids})});if(data.code===0){await loadMessages();closeMobileAction();}}
async function deleteByIds(ids){if(!ids.length) return;const data=await apiFetch('/api/messages',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids})});if(data.code===0){await loadMessages();closeMobileAction();}}
async function markAllRead(){const data=await apiFetch('/api/messages/read-all',{method:'POST'});if(data.code===0){await loadMessages();}}
async function clearAllMessages(){const data=await apiFetch('/api/messages/clear',{method:'DELETE'});if(data.code===0){state.page=1;await loadMessages();}}

els.queryBtn.addEventListener('click',triggerSearch);
els.resetBtn.addEventListener('click',()=>{els.searchText.value='';els.startTime.value='';els.endTime.value='';state.page=1;document.querySelector('input[name="pageSize"][value="10"]').checked=true;clearQuickHours();document.querySelectorAll('input[name="keywordFilter"]').forEach(el=>{el.checked=false;});loadMessages().catch(()=>{});});
els.notifyBtn.addEventListener('click',()=>requestNotificationPermission().catch(()=>{}));
els.readAllBtn.addEventListener('click',()=>openConfirm({title:'一键已读',text:'确定将全部未读消息标记为已读吗？',okText:'确认已读',okClass:'primary',onConfirm:markAllRead}));
els.clearAllBtn.addEventListener('click',()=>openConfirm({title:'清空消息',text:'确定清空全部消息吗？此操作不可恢复。',okText:'确认清空',okClass:'danger',onConfirm:clearAllMessages}));
els.prevBtn.addEventListener('click',()=>{if(state.page>1){state.page-=1;loadMessages().catch(()=>{});}});
els.nextBtn.addEventListener('click',()=>{if(state.page<state.totalPages){state.page+=1;loadMessages().catch(()=>{});}});
document.querySelectorAll('input[name="pageSize"]').forEach(el=>el.addEventListener('change',()=>{state.page=1;loadMessages().catch(()=>{});}));
document.querySelectorAll('input[name="quickHours"]').forEach(el=>el.addEventListener('change',e=>{applyQuickHours(Number(e.target.value||0));triggerSearch();}));
document.querySelectorAll('input[name="keywordFilter"]').forEach(el=>el.addEventListener('change',triggerSearch));
els.loginBtn.addEventListener('click',doLogin);
els.mobileReadBtn.addEventListener('click',()=>markReadByIds([state.actionId]).catch(()=>{}));
els.mobileDeleteBtn.addEventListener('click',()=>deleteByIds([state.actionId]).catch(()=>{}));
els.mobileCancelBtn.addEventListener('click',closeMobileAction);
els.mobileActionMask.addEventListener('click',e=>{if(e.target===els.mobileActionMask)closeMobileAction();});
els.confirmCancelBtn.addEventListener('click',closeConfirm);
els.confirmOkBtn.addEventListener('click',()=>runConfirm().catch(()=>{}));
els.confirmMask.addEventListener('click',e=>{if(e.target===els.confirmMask)closeConfirm();});
els.checkAll.addEventListener('change',e=>{if(e.target.checked)state.list.forEach(item=>state.selected.add(item.id));else state.selected.clear();renderDesktop();});
els.bulkReadBtn.addEventListener('click',()=>markReadByIds(Array.from(state.selected)).catch(()=>{}));
els.bulkDeleteBtn.addEventListener('click',()=>deleteByIds(Array.from(state.selected)).catch(()=>{}));
window.addEventListener('scroll',cancelLongPress,{passive:true});
window.addEventListener('resize',()=>{cancelLongPress();render();});
window.addEventListener('focus',autoRefreshMessages);
document.addEventListener('visibilitychange',()=>{if(!document.hidden) autoRefreshMessages();});
els.startTime.addEventListener('change',()=>{clearQuickHours();triggerSearch();});
els.endTime.addEventListener('change',()=>{clearQuickHours();triggerSearch();});
swallowLongPressOnModal(els.mobileActionModal);
swallowLongPressOnModal(els.confirmModal);
normalizeTimeInputs();
updateNotifyButton();
startAutoRefresh();

loadMessages().catch(()=>{});
</script>
</body>
</html>
